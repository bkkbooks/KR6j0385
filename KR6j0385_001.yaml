body:
  text: 唐三藏沙門大廣智不空奉詔譯如是我聞一時薄伽梵住憍睒彌國建吒迦林與大苾芻衆五百人俱又與多諸大菩薩摩訶薩俱時憍睒彌國中有一長者名曰妙月諸根寂靜心意寂靜多有男女及多僮僕淨信成就往詣佛所頭面禮足繞百千匝却住一面合掌恭敬而白佛言世尊欲問如來應正等覺少有所疑事惟願大慈垂愍聽許爾時世尊告長者言恣汝意問當為汝説令汝心喜時彼長者聞是語已歡喜踊躍世尊云何善男子善女人諸貧匱者可得富饒諸有疾病令無疾病爾時世尊告妙月長者言何緣作如是問時彼長者重白佛言世尊我等在家多諸眷屬資財乏少難可支濟又多疾病惟願世尊開示法要當令貧者永離貧窮倉庫財寶皆悉盈滿存濟家中妻子男女眷屬有來求者必生歡喜為大施主使諸倉庫金銀珍寶如意摩尼金剛諸珍商佉室羅赤珠碼瑙金寶之類豐饒無有盡竭周給親屬廣修惠施饒益有情爾時世尊告妙月長者言善男子我於過去阿僧祇劫前遇佛世尊名持金剛海音如來應正遍知從彼如來受得此雨寶陀羅尼受持讀誦思惟計念隨喜為他廣説流布由此陀羅尼威德力故若善男子人與非人藥叉羅剎畢隸多畢舍遮鳩槃拏烏娑多羅迦布單那羯吒布單那等起惡心者不能為害復有諸鬼噉人脂髓膿血涕唾大小便利欲來惱者不能為障礙佛告妙月若有善男子心念手持書寫但聞名字受持隨喜廣為他敷演者彼善男子善女人長夜安隱受諸快樂為瑜伽資糧安隱豐饒故若有人欲受持此雨寶陀羅尼者應供養一切如來一夜二夜或三夜專心誦持受敬淨信三寶諸天悉皆歡喜即雨財寶穀麥為彼讀誦法師故即説陀羅尼曰曩謨引婆去聲誐嚩帝一嚩日囉二合馱囉二娑引誐囉捏奴逸切具灑引耶三怛他引𮒶多引野四引怛儞也二合他引唵素嚕閉五跋捺囉二合嚩底丁以切六矒誐阿左㘑七阿左跛㘑八嗢鳥骨切伽引跢儞九嗢陛娜儞十薩寫嚩底十一馱引娘上聲嚩底丁以切十二馱曩嚩底十三室唎二合麼底十四鉢囉二合婆嚩底十五阿上聲麼㘑十六尾麼黎十七嚕嚕十八素嚕閉十九尾麼黎二十阿娜多悉帝二合二十一尾娜多悉帝二合二十二尾濕嚩二合計如二十三鴦矩㘑二十四矒矩㘑二十五地地冥二十六度度冥二十七跢跢㘑二十八多囉多囉二十九嚩日㘑二合三十阿引跢儞三十一步計屋計三十二吒計吒計三十三囉灑二合尼三十四儞澀播二合引娜儞三十五婆誐挽三十六嚩日囉二合馱囉三十七娑引誐囉三十八捏具引衫三十九怛他引蘖跢麼弩娑磨二合囉四十娑麼二合囉娑麼二合囉四十一薩嚩怛他引孽跢四十二薩底也二合四十三麼弩娑麼二合囉四十四僧伽薩底也二合麼弩娑麼二合囉四十五怛吒怛吒四十六布引囉布引囉四十七布引囉也布引囉野四十八婆囉婆去聲囉婆去聲囉抳四十九素矒誐麗五十扇引跢麼底五十一瞢誐攞麼底五十二鉢囉二合婆引麼底摩訶引麼底五十三素婆捺囉二合嚩底五十四阿引蘖蹉引阿引蘖蹉五十五引三麼野麼弩娑麼二合囉娑嚩二合引賀引五十六阿馱引囉拏麼弩娑麼二合囉娑嚩二合引賀引五十七鉢囉二合婆去聲引嚩麼弩娑麼二合囉娑嚩二合賀引五十八馱哩二合底麼弩娑麼二合囉娑嚩二合引賀五十九引尾惹野麼弩娑麼二合囉娑嚩二合賀引六十薩嚩薩怛嚩二合尾惹野麼弩娑麼二合囉娑嚩二合引賀引六十一佛告妙月長者此名雨寶陀羅尼以此陀羅尼威力病患飢儉疾疫業障悉皆消滅若善男子善女人先應供養一切如來於一日一夜無間斷誦持此陀羅尼其家即雨寶如大人量一切災禍悉皆銷滅是故善男子當受持此雨寶陀羅尼廣為他人分別演説善哉世尊妙月長者聞佛所説歡喜踊躍我今從佛受此雨寶陀羅尼受持讀誦廣為他人分別解説爾時妙月長者受佛教已右繞世尊百千匝已合掌恭敬頭面禮足歡喜而去爾時佛告具壽阿難陀汝往妙月長者家看彼長者諸庫藏中種種財穀諸珍寶物及諸資具今悉盈滿爾時具壽阿難陀受佛教已往詣憍睒彌大城往妙月長者家中入已見諸庫藏之中財寶悉皆盈滿見此事已心大歡喜踊躍而還爾時具壽阿難陀怪未曾有心甚歡喜而白佛言世尊以何因緣妙月長者家中庫藏盈滿佛言善男子妙月長者淨信於我受持此雨寶陀羅尼為一切有情宣説是故阿難受持此陀羅尼廣為人説我以佛眼觀諸世間天人魔梵沙門婆羅門於此受持雨寶陀羅尼者不能作其障難何以故如來不異語故此真言句不可壞故此陀羅尼無善根有情耳尚不聞何況書寫受持讀誦何以故一切如來真語宣説一切如來隨喜一切如來稱讚一切如來顯揚一切如來種植阿難陀白佛言善哉世尊以妙伽他而説頌曰諸佛不思議佛法亦復然淨信不思議果報亦復然寂慧一切智法王不生滅已到勝彼岸稽首佛勇猛爾時具壽阿難陀聞佛説此雨寶陀羅尼經踊躍歡喜白佛言世尊今此法要當何名此經我等今者云何奉持佛告阿難陀此經名妙月長者所問汝當受持亦名能獲一切財寶伏藏亦名一切如來稱讚雨寶陀羅尼教汝當受持時薄伽梵説此經已無量苾芻及諸菩薩并諸天人阿蘇羅等一切大衆聞佛所説皆大歡喜信受奉行心真言曰唵嚩素馱㘑娑嚩二合引賀引心中心真言曰唵室唎二合嚩素娑嚩二合引賀引小心真言曰唵嚩素娑嚩二合引賀引持世陀羅尼􅁌􅟅􅋌􅞣􅋌􅝝􅋌􅋌􅋌􅁥􅋌􅁥􅋌􅁥􅋌􅁥􅁥雨寶陀羅尼􅞻􅋌􅋌􅞣􅋌􅋌􅋌􅋌􅁥􅋌􅁥􅋌􅁥􅋌􅁥􅋌􅁥􅞣􅋌􅁥
